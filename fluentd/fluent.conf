<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter docker.**>
  @type record_transformer
  enable_ruby true
  <record>
    hostname "#{Socket.gethostname}"
    container_name ${tag_parts[1]}
  </record>
</filter>
<match **>
  @type elasticsearch
  @id out_es
  @log_level info

  # Connection
    host  "#{ENV['ES_HOST'] || 'elasticsearch'}"
    port  "#{ENV['ES_PORT'] || 9200}"
    user "#{ENV['ES_USER'] || 'fluentd_user'}"
    password "#{ENV['ES_PASSWORD'] || 'fluentd_pass'}"
  scheme http

  # QUAN TRỌNG: Fix version detection
  suppress_type_name true
  verify_es_version_at_startup false
  default_elasticsearch_version 8

  # Index settings
  logstash_format true
  logstash_prefix docker-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key @log_name


  # Buffer - PHẢI CÓ!
  <buffer tag, time>
    @type file
    path /fluentd/log/buffer/es
    timekey 60
    timekey_wait 10s
    flush_mode interval
    flush_interval 5s
    flush_at_shutdown true
    retry_type exponential_backoff
    retry_wait 2s
    retry_max_interval 30s
    retry_timeout 60m
    overflow_action drop_oldest_chunk
  </buffer>

  # Request settings
  request_timeout 30s
  reload_connections true
  reconnect_on_error true

  # Error handling
  <secondary>
    @type file
    path /fluentd/log/failed_records
  </secondary>
</match>